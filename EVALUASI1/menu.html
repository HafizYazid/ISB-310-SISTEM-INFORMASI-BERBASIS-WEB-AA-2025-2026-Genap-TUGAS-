<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Sistem Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="header-images">
            <img src="asset/itenas_cover.jpeg" alt="Header 1">
            <img src="asset/itenas_cover.jpeg" alt="Header 2">
            <img src="asset/itenas_cover.jpeg" alt="Header 3">
            <img src="asset/itenas_cover.jpeg" alt="Header 4">
            <img src="asset/itenas_cover.jpeg" alt="Header 5">
            <img src="asset/itenas_cover.jpeg" alt="Header 6">
        </div>

        <div class="content-wrapper">
            <div class="sidebar">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="calculator.html">Calculator</a></li>
                </ul>
            </div>

            <div class="main-content">
                <table class="menu-table">
                    <tr>
                        <th align="left">No</th>
                        <th align="left">Makanan/Minuman</th>
                        <th align="left">Harga</th>
                        <th align="left">Pesan</th>
                        <th></th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>Bakso Istimewa</td>
                        <td>@ Rp 12000</td>
                        <td><input type="number" id="qty1" min="0" value="0" oninput="hitungTotal()"></td>
                        <td rowspan="3" align="center" style="background-color: white;">
                            <button class="btn-black" onclick="resetMenu()" style="width: 80%; padding: 10px 0;">Reset</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Soto Spesial</td>
                        <td>@ Rp 10000</td>
                        <td><input type="number" id="qty2" min="0" value="0" oninput="hitungTotal()"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Mie Ayam Super</td>
                        <td>@ Rp 15000</td>
                        <td><input type="number" id="qty3" min="0" value="0" oninput="hitungTotal()"></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right">Jumlah Total</td>
                        <td colspan="2"><input type="text" id="total" readonly value="0"></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right">Diskon</td>
                        <td colspan="2"><input type="text" id="diskon" readonly value="0"></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="text-right">Jumlah Bayar</td>
                        <td colspan="2"><input type="text" id="bayar" readonly value="0"></td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="footer">
            280224<br>
            Sistem Informasi | ITENAS 2024
        </div>
    </div>

    <script>
        window.onload = function() {
            alert("Input Jumlah Pesanan agar di hitung otomatis oleh sistem");
        };

        function hitungTotal() {
            let q1 = parseInt(document.getElementById('qty1').value) || 0;
            let q2 = parseInt(document.getElementById('qty2').value) || 0;
            let q3 = parseInt(document.getElementById('qty3').value) || 0;

            let total = (q1 * 12000) + (q2 * 10000) + (q3 * 15000);
            let diskon = 0;

            if (total > 50000) {
                diskon = total * 0.10; // Diskon 10%
            }

            let bayar = total - diskon;

            document.getElementById('total').value = total;
            document.getElementById('diskon').value = diskon;
            document.getElementById('bayar').value = bayar;
        }

        function resetMenu() {
            document.getElementById('qty1').value = "0";
            document.getElementById('qty2').value = "0";
            document.getElementById('qty3').value = "0";
            hitungTotal();
        }
    </script>
</body>
</html>
